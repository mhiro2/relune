name: Test Action

on:
  pull_request:
    paths:
      - "action/**"
      - "crates/relune-cli/**"
      - "crates/relune-app/**"
      - "crates/relune-core/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Build relune
        run: cargo build -p relune-cli --release
      - name: Test action (no changes)
        id: diff-no-changes
        uses: ./action
        with:
          before: fixtures/sql/simple_blog.sql
          after: fixtures/sql/simple_blog.sql
          binary-path: target/release/relune
      - name: Verify no changes detected
        run: |
          if [[ "${{ steps.diff-no-changes.outputs.has-changes }}" != "false" ]]; then
            echo "::error::Expected has-changes=false for identical schemas"
            exit 1
          fi
      - name: Test action (with changes)
        id: diff-with-changes
        uses: ./action
        with:
          before: fixtures/sql/simple_blog.sql
          after: fixtures/sql/ecommerce.sql
          binary-path: target/release/relune
      - name: Verify changes detected
        run: |
          if [[ "${{ steps.diff-with-changes.outputs.has-changes }}" != "true" ]]; then
            echo "::error::Expected has-changes=true for different schemas"
            exit 1
          fi
          if [[ ! -f "${{ steps.diff-with-changes.outputs.output-path }}" ]]; then
            echo "::error::Output file not found"
            exit 1
          fi
