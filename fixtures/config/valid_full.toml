# Complete configuration example with all options

[render]
format = "html"
dialect = "postgres"
theme = "dark"
layout = "force-directed"
edge_style = "orthogonal"
direction = "left-to-right"
viewpoint = "billing"
group_by = "schema"
focus = "users"
depth = 2
include = ["users", "posts", "comments"]
exclude = ["migrations", "audit_logs"]
show_legend = true
show_stats = true

[inspect]
format = "json"
dialect = "postgres"

[export]
format = "graph-json"
dialect = "postgres"
viewpoint = "billing"
group_by = "prefix"
layout = "hierarchical"
edge_style = "curved"
direction = "right-to-left"
focus = "posts"
depth = 3
include = ["users", "posts"]
exclude = ["audit_logs"]

[diff]
format = "json"
dialect = "postgres"

[doc]
dialect = "postgres"

[lint]
dialect = "postgres"

[viewpoints.billing]
focus = "users"
depth = 1
group_by = "schema"
include = ["users", "posts"]
exclude = ["comments"]

[viewpoints.auth]
focus = "users"
depth = 1
group_by = "prefix"
include = ["users", "sessions"]
exclude = ["audit_logs"]
