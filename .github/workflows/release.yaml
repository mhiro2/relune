name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Verify Cargo version matches release tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="relune-cli") | .version')"
          test "${TAG_VERSION}" = "${CARGO_VERSION}"
      - name: Install Zig
        # Pin to 0.15.x: zig 0.16.0 breaks cargo-zigbuild's `ar` wrapper when
        # building ring/psm. See https://github.com/rust-cross/cargo-zigbuild/issues/433
        run: |
          brew install zig@0.15
          echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Add Rust targets
        run: >-
          rustup target add
          x86_64-apple-darwin
          aarch64-apple-darwin
          x86_64-unknown-linux-musl
          aarch64-unknown-linux-musl
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Create/update draft release and upload assets
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      - name: Publish draft release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
